<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ただ、空を見ている</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    width: 100vw; height: 100vh;
    overflow: hidden;
    font-family: 'Noto Serif JP', serif;
    cursor: none;
  }

  /* 空の写真レイヤー */
  .sky {
    position: fixed;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 4s ease;
    filter: brightness(0.7) saturate(0.8);
  }

  .sky.visible { opacity: 1; }

  /* 上下グラデオーバーレイ */
  .overlay {
    position: fixed;
    inset: 0;
    background:
      linear-gradient(to bottom,
        rgba(0,0,0,0.4) 0%,
        transparent 30%,
        transparent 70%,
        rgba(0,0,0,0.6) 100%
      );
    z-index: 10;
    pointer-events: none;
  }

  /* 呼吸の光 */
  #breath-orb {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent);
    border: 1px solid rgba(255,255,255,0.2);
    z-index: 20;
    animation: breathe 6s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% {
      transform: translate(-50%, -50%) scale(1);
      opacity: 0.4;
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }
    50% {
      transform: translate(-50%, -50%) scale(1.6);
      opacity: 0.8;
      box-shadow: 0 0 60px rgba(255,255,255,0.2);
    }
  }

  /* 言葉 */
  #word {
    position: fixed;
    bottom: 15vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    text-align: center;
    opacity: 0;
    transition: opacity 3s ease;
  }

  #word.visible { opacity: 1; }

  .word-main {
    font-size: clamp(1rem, 4vw, 1.4rem);
    font-weight: 200;
    letter-spacing: 0.5em;
    color: rgba(255,255,255,0.85);
    line-height: 2;
  }

  .word-sub {
    font-size: clamp(0.6rem, 2vw, 0.75rem);
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.35);
    margin-top: 0.8rem;
  }

  /* タップヒント */
  #hint {
    position: fixed;
    bottom: 5vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.2);
    z-index: 30;
    animation: hintFade 4s ease-in-out infinite;
  }

  @keyframes hintFade {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.5; }
  }

  /* 画面タップの波紋 */
  .ripple {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.3);
    transform: translate(-50%, -50%) scale(0);
    animation: rippleOut 1.5s ease-out forwards;
    pointer-events: none;
    z-index: 50;
  }

  @keyframes rippleOut {
    to {
      transform: translate(-50%, -50%) scale(8);
      opacity: 0;
    }
  }

  /* フェードアウト遷移 */
  #fade {
    position: fixed;
    inset: 0;
    background: #0a0a0f;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease;
  }
  #fade.show { opacity: 1; pointer-events: all; }
</style>
</head>
<body>

<div class="sky" id="sky1"></div>
<div class="sky" id="sky2"></div>
<div class="overlay"></div>
<div id="breath-orb"></div>

<div id="word">
  <div class="word-main" id="word-text">ただ、ここにいていい</div>
  <div class="word-sub" id="word-sub">息を吸って　ゆっくり吐く</div>
</div>

<div id="hint">tap softly</div>
<div id="fade"></div>

<script>
// 空の写真 — GitHubにpushした後は実際のパスに変える
// 今は美しいグラデーションで代替
const skies = [
  { gradient: 'linear-gradient(to bottom, #2c3e50 0%, #4a6fa5 40%, #c9a96e 70%, #8b5e3c 100%)', words: ['ただ、ここにいていい'], subs: ['息を吸って　ゆっくり吐く'] },
  { gradient: 'linear-gradient(to bottom, #1a1a2e 0%, #4a5568 30%, #718096 60%, #a0aec0 85%, #e8d5b7 100%)', words: ['失ったものは　本当にあった', 'だから今　痛い'], subs: ['それでいい', '空はずっとここにある'] },
  { gradient: 'linear-gradient(to bottom, #0d1117 0%, #1e2d40 40%, #2d4a6e 70%, #4a7fa5 100%)', words: ['呼吸している', 'それだけで　十分'], subs: ['ゆっくり　ゆっくり', '焦らなくていい'] },
  { gradient: 'linear-gradient(to bottom, #2d1b33 0%, #4a3560 40%, #7a6090 70%, #b8a8c8 90%, #e8dff0 100%)', words: ['人は変わり　別れる', 'それでも空は続く'], subs: ['あなたも続いていく', ''] },
];

// 実際の写真ファイルがある場合は以下のように上書き
// skies[0].image = 'sky1.jpg';
// skies[1].image = 'sky2.jpg';

let current = 0;
let isTransitioning = false;

const sky1El = document.getElementById('sky1');
const sky2El = document.getElementById('sky2');
const wordEl = document.getElementById('word');
const wordText = document.getElementById('word-text');
const wordSub = document.getElementById('word-sub');
const fadeEl = document.getElementById('fade');

function applySky(el, idx) {
  const s = skies[idx];
  if (s.image) {
    el.style.backgroundImage = `url(${s.image})`;
  } else {
    el.style.backgroundImage = s.gradient;
  }
}

function showScene(idx) {
  const s = skies[idx];
  const active = idx % 2 === 0 ? sky1El : sky2El;
  const inactive = idx % 2 === 0 ? sky2El : sky1El;

  applySky(active, idx);

  // 言葉をランダム選択
  const wi = Math.floor(Math.random() * s.words.length);
  wordText.textContent = s.words[wi];
  wordSub.textContent = s.subs[wi] || '';

  // フェードイン
  setTimeout(() => {
    inactive.classList.remove('visible');
    active.classList.add('visible');
    setTimeout(() => {
      wordEl.classList.add('visible');
    }, 1500);
  }, 100);
}

function nextScene(x, y) {
  if (isTransitioning) return;
  isTransitioning = true;

  // 波紋
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = x + 'px';
  r.style.top = y + 'px';
  r.style.width = '60px';
  r.style.height = '60px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 1500);

  // 言葉をフェードアウト
  wordEl.classList.remove('visible');

  setTimeout(() => {
    current = (current + 1) % skies.length;
    showScene(current);
    isTransitioning = false;
  }, 1200);
}

// タップ・クリック
document.addEventListener('click', e => nextScene(e.clientX, e.clientY));
document.addEventListener('touchend', e => {
  const t = e.changedTouches[0];
  nextScene(t.clientX, t.clientY);
});

// 初期表示
showScene(0);

// 60秒で自動的に次へ
setInterval(() => {
  if (!isTransitioning) nextScene(window.innerWidth/2, window.innerHeight/2);
}, 60000);
</script>
</body>
</html>
