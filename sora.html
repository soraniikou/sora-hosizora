<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ただ、空を見ている</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    width: 100vw; height: 100vh;
    overflow: hidden;
    font-family: 'Noto Serif JP', serif;
    cursor: none;
  }

  /* 空の写真レイヤー */
  .sky {
    position: fixed;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 4s ease;
    filter: brightness(0.7) saturate(0.8);
  }

  .sky.visible { opacity: 1; }

  /* 上下グラデオーバーレイ */
  .overlay {
    position: fixed;
    inset: 0;
    background:
      linear-gradient(to bottom,
        rgba(0,0,0,0.4) 0%,
        transparent 30%,
        transparent 70%,
        rgba(0,0,0,0.6) 100%
      );
    z-index: 10;
    pointer-events: none;
  }

  /* 言葉 */
  #word {
    position: fixed;
    bottom: 15vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    text-align: center;
    opacity: 0;
    transition: opacity 3s ease;
  }

  #word.visible { opacity: 1; }

  .word-main {
    font-size: clamp(1rem, 4vw, 1.4rem);
    font-weight: 200;
    letter-spacing: 0.5em;
    color: rgba(255,255,255,0.85);
    line-height: 2;
  }

  /* タップヒント */
  #hint {
    position: fixed;
    bottom: 5vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.2rem;
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.75);
    z-index: 30;
    animation: hintFade 4s ease-in-out infinite;
  }

  @keyframes hintFade {
    0%, 100% { opacity: 0.65; }
    50% { opacity: 1; }
  }

  /* 画面タップの波紋 */
  .ripple {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.3);
    transform: translate(-50%, -50%) scale(0);
    animation: rippleOut 13.5s ease-out forwards;
    pointer-events: none;
    z-index: 50;
  }

  @keyframes rippleOut {
    to {
      transform: translate(-50%, -50%) scale(8);
      opacity: 0;
    }
  }

  @media (pointer: coarse) {
    .ripple {
      animation-name: rippleOutMobile;
    }
  }

  @keyframes rippleOutMobile {
    to {
      transform: translate(-50%, -50%) scale(5.6);
      opacity: 0;
    }
  }

  /* フェードアウト遷移 */
  #fade {
    position: fixed;
    inset: 0;
    background: #0a0a0f;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease;
  }
  #fade.show { opacity: 1; pointer-events: all; }

  /* マウス位置マーク（PC・タップ前のみ） */
  #cursor-mark {
    position: fixed;
    left: 0;
    top: 0;
    width: 8px;
    height: 8px;
    pointer-events: none;
    z-index: 60;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 1.5s ease;
  }

  @media (pointer: coarse) {
    #cursor-mark { display: none; }
  }

  #cursor-mark::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.5);
    filter: blur(1px);
  }

  #cursor-mark::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 3px rgba(255, 255, 255, 0.8);
  }

  #cursor-mark.visible { opacity: 1; }

  /* 背景の星 */
  #night-sky {
    position: fixed;
    inset: 0;
    z-index: 22;
    opacity: 0;
    visibility: hidden;
    transition: opacity 4s ease, visibility 4s ease;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 30%, rgba(8, 12, 28, 0.5) 0%, rgba(4, 6, 16, 0.85) 100%);
  }

  #night-sky.visible {
    opacity: 1;
    visibility: visible;
  }

  #stardust-layer {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  #night-sky .bg-star {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(
      circle,
      rgba(255, 255, 255, 0.9) 0%,
      rgba(230, 238, 255, 0.45) 35%,
      transparent 70%
    );
    pointer-events: none;
  }

  /* オリオン座 */
  #orion {
    position: fixed;
    inset: 0;
    z-index: 25;
    opacity: 0;
    transition: opacity 5s ease;
    pointer-events: none;
    overflow: hidden;
  }

  #orion.visible { opacity: 1; }

  .orion-spin {
    position: absolute;
    left: 50%;
    top: 50%;
    width: min(92vw, 72vh);
    aspect-ratio: 100 / 72;
    transform: translate(-50%, -50%);
    transform-origin: center center;
    animation: orionRotate 36s linear infinite;
    will-change: transform;
  }

  @keyframes orionRotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }

  .orion-svg {
    display: block;
    width: 100%;
    height: 100%;
    overflow: visible;
    filter: blur(3.5px);
  }

  .orion-line {
    stroke: rgba(255, 255, 255, 0.12);
    stroke-width: 0.25;
    fill: none;
    filter: blur(0.3px);
  }

  .star-halo { filter: url(#starBlur); }
  .star-core { filter: url(#starShine); }

  .star-pulse {
    animation: starPulse 5s ease-in-out infinite;
  }

  @keyframes starPulse {
    0%, 100% { opacity: 0.82; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<div class="sky" id="sky1"></div>
<div class="sky" id="sky2"></div>
<div class="overlay"></div>

<div id="word">
  <div class="word-main" id="word-text">ただ、ここにいていい</div>
</div>

<div id="night-sky" aria-hidden="true">
  <div id="stardust-layer"></div>
</div>

<div id="orion" aria-hidden="true">
  <div class="orion-spin">
    <svg class="orion-svg" viewBox="0 0 100 72" aria-label="オリオン座">
      <defs>
        <filter id="orionSoft" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="2.2" result="soft"/>
          <feMerge>
            <feMergeNode in="soft"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="starBlur" x="-200%" y="-200%" width="500%" height="500%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feGaussianBlur stdDeviation="3" result="blur2"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="blur2"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="starShine" x="-250%" y="-250%" width="600%" height="600%">
          <feGaussianBlur stdDeviation="3.5" result="glow"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="core"/>
          <feMerge>
            <feMergeNode in="glow"/>
            <feMergeNode in="core"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <radialGradient id="haloWarm" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fff5e8" stop-opacity="0.95"/>
          <stop offset="35%" stop-color="#ffb88a" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#ff8c50" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="haloCool" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
          <stop offset="30%" stop-color="#c8e0ff" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="#88b8ff" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="haloSoft" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
          <stop offset="40%" stop-color="#e8eeff" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#a0b8ff" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <g filter="url(#orionSoft)">
      <g class="orion-lines">
        <line class="orion-line" x1="22" y1="18" x2="78" y2="20"/>
        <line class="orion-line" x1="22" y1="18" x2="36" y2="42"/>
        <line class="orion-line" x1="78" y2="20" x2="64" y2="42"/>
        <line class="orion-line" x1="36" y1="42" x2="50" y2="44"/>
        <line class="orion-line" x1="50" y1="44" x2="64" y2="42"/>
        <line class="orion-line" x1="36" y1="42" x2="26" y2="58"/>
        <line class="orion-line" x1="64" y1="42" x2="74" y2="58"/>
      </g>
      <g class="star-pulse" transform="translate(22,18)">
        <circle class="star-halo" r="9" fill="url(#haloWarm)" opacity="0.7"/>
        <circle class="star-core" r="1.2" fill="#fffef8"/>
      </g>
      <g class="star-pulse" transform="translate(78,20)">
        <circle class="star-halo" r="6" fill="url(#haloSoft)" opacity="0.65"/>
        <circle class="star-core" r="0.9" fill="#fff"/>
      </g>
      <g class="star-pulse" transform="translate(36,42)">
        <circle class="star-halo" r="5" fill="url(#haloSoft)" opacity="0.6"/>
        <circle class="star-core" r="0.75" fill="#fff"/>
      </g>
      <g class="star-pulse" transform="translate(50,44)">
        <circle class="star-halo" r="6.5" fill="url(#haloCool)" opacity="0.75"/>
        <circle class="star-core" r="1" fill="#fff"/>
      </g>
      <g class="star-pulse" transform="translate(64,42)">
        <circle class="star-halo" r="5" fill="url(#haloSoft)" opacity="0.6"/>
        <circle class="star-core" r="0.75" fill="#fff"/>
      </g>
      <g class="star-pulse" transform="translate(26,58)">
        <circle class="star-halo" r="5.5" fill="url(#haloSoft)" opacity="0.62"/>
        <circle class="star-core" r="0.8" fill="#fff"/>
      </g>
      <g class="star-pulse" transform="translate(74,58)">
        <circle class="star-halo" r="8" fill="url(#haloCool)" opacity="0.8"/>
        <circle class="star-core" r="1.1" fill="#f8fcff"/>
      </g>
      </g>
    </svg>
  </div>
</div>

<div id="hint">tap softly</div>
<div id="cursor-mark" aria-hidden="true"></div>
<div id="fade"></div>

<script>
// 空の写真 — GitHubにpushした後は実際のパスに変える
// 今は美しいグラデーションで代替
const skies = [
  { gradient: 'linear-gradient(to bottom, #2c3e50 0%, #4a6fa5 40%, #c9a96e 70%, #8b5e3c 100%)' },
  { gradient: 'linear-gradient(to bottom, #1a1a2e 0%, #4a5568 30%, #718096 60%, #a0aec0 85%, #e8d5b7 100%)' },
  { gradient: 'linear-gradient(to bottom, #0d1117 0%, #1e2d40 40%, #2d4a6e 70%, #4a7fa5 100%)' },
  { gradient: 'linear-gradient(to bottom, #2d1b33 0%, #4a3560 40%, #7a6090 70%, #b8a8c8 90%, #e8dff0 100%)' },
];

const STAR_COUNT = 30;

const messages = [
  'ただ、ここにいていい',
  '苦手なことがあってもいい',
  '呼吸してみる',
  '生きていてくれてありがとう',
  '人は変わっていくね',
  'それでも空は続く',
  '休んでもいい',
];

// 実際の写真ファイルがある場合は以下のように上書き
// skies[0].image = 'sky1.jpg';
// skies[1].image = 'sky2.jpg';

let messageIndex = 0;
let orionShown = false;
let isTransitioning = false;
let cursorMarkHidden = false;
let cursorIdleTimer = null;

function isCoarsePointer() {
  return window.matchMedia('(pointer: coarse)').matches;
}

const sky1El = document.getElementById('sky1');
const sky2El = document.getElementById('sky2');
const wordEl = document.getElementById('word');
const wordText = document.getElementById('word-text');
const hintEl = document.getElementById('hint');
const nightSkyEl = document.getElementById('night-sky');
const orionEl = document.getElementById('orion');
const cursorMark = document.getElementById('cursor-mark');

function applySky(el, idx) {
  const s = skies[idx];
  if (s.image) {
    el.style.backgroundImage = `url(${s.image})`;
  } else {
    el.style.backgroundImage = s.gradient;
  }
}

function showScene(idx) {
  const skyIdx = idx % skies.length;
  const active = skyIdx % 2 === 0 ? sky1El : sky2El;
  const inactive = skyIdx % 2 === 0 ? sky2El : sky1El;

  applySky(active, skyIdx);
  wordText.textContent = messages[idx];

  setTimeout(() => {
    inactive.classList.remove('visible');
    active.classList.add('visible');
    setTimeout(() => wordEl.classList.add('visible'), 1500);
  }, 100);
}

function createStardust() {
  const layer = document.getElementById('stardust-layer');
  layer.replaceChildren();

  for (let i = 0; i < STAR_COUNT; i++) {
    const star = document.createElement('div');
    star.className = 'bg-star';
    const size = Math.random() * 1.1 + 0.4;
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.opacity = (Math.random() * 0.35 + 0.45).toFixed(2);
    layer.appendChild(star);
  }
}

function showOrion() {
  orionShown = true;
  wordEl.classList.remove('visible');
  hintEl.style.opacity = '0';
  sky1El.style.filter = 'brightness(0.35) saturate(0.7)';
  sky2El.style.filter = 'brightness(0.35) saturate(0.7)';

  setTimeout(() => {
    hintEl.style.display = 'none';
    nightSkyEl.classList.add('visible');
    nightSkyEl.setAttribute('aria-hidden', 'false');
    createStardust();
    orionEl.classList.add('visible');
    orionEl.setAttribute('aria-hidden', 'false');
  }, 1200);
}

function createRipple(x, y) {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = x + 'px';
  r.style.top = y + 'px';
  r.style.width = '60px';
  r.style.height = '60px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 13500);
}

function nextScene() {
  if (isTransitioning || orionShown) return;
  isTransitioning = true;

  wordEl.classList.remove('visible');

  setTimeout(() => {
    if (messageIndex < messages.length - 1) {
      messageIndex++;
      showScene(messageIndex);
    } else {
      showOrion();
    }
    isTransitioning = false;
  }, 1200);
}

function hideCursorMark() {
  cursorMarkHidden = true;
  clearTimeout(cursorIdleTimer);
  cursorMark.classList.remove('visible');
  cursorMark.setAttribute('aria-hidden', 'true');
}

function showCursorMark(x, y) {
  if (cursorMarkHidden || isCoarsePointer()) return;
  cursorMark.style.left = x + 'px';
  cursorMark.style.top = y + 'px';
  cursorMark.classList.add('visible');
  cursorMark.setAttribute('aria-hidden', 'false');
  clearTimeout(cursorIdleTimer);
  cursorIdleTimer = setTimeout(() => {
    if (cursorMarkHidden) return;
    cursorMark.classList.remove('visible');
    cursorMark.setAttribute('aria-hidden', 'true');
  }, 2000);
}

// タップ・クリック — どこを触れても波紋
document.addEventListener('click', e => {
  hideCursorMark();
  createRipple(e.clientX, e.clientY);
  nextScene();
});
document.addEventListener('touchend', e => {
  const t = e.changedTouches[0];
  hideCursorMark();
  createRipple(t.clientX, t.clientY);
  nextScene();
});

showScene(0);

document.addEventListener('mousemove', e => {
  showCursorMark(e.clientX, e.clientY);
});

document.addEventListener('mouseleave', () => {
  if (cursorMarkHidden || isCoarsePointer()) return;
  clearTimeout(cursorIdleTimer);
  cursorMark.classList.remove('visible');
  cursorMark.setAttribute('aria-hidden', 'true');
});

window.addEventListener('resize', () => {
  if (nightSkyEl.classList.contains('visible')) createStardust();
});

// 60秒で自動的に次へ
setInterval(() => {
  if (!isTransitioning) {
    createRipple(window.innerWidth / 2, window.innerHeight / 2);
    nextScene();
  }
}, 60000);
</script>
</body>
</html>
