<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ただ、空を見ている</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    width: 100vw; height: 100vh;
    overflow: hidden;
    font-family: 'Noto Serif JP', serif;
    cursor: none;
  }

  /* 空の写真レイヤー */
  .sky {
    position: fixed;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 4s ease;
    filter: brightness(0.7) saturate(0.8);
  }

  .sky.visible { opacity: 1; }

  /* 上下グラデオーバーレイ */
  .overlay {
    position: fixed;
    inset: 0;
    background:
      linear-gradient(to bottom,
        rgba(0,0,0,0.4) 0%,
        transparent 30%,
        transparent 70%,
        rgba(0,0,0,0.6) 100%
      );
    z-index: 10;
    pointer-events: none;
  }

  /* 言葉 */
  #word {
    position: fixed;
    bottom: 15vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    text-align: center;
    opacity: 0;
    transition: opacity 3s ease;
  }

  #word.visible { opacity: 1; }

  .word-main {
    font-size: clamp(1rem, 4vw, 1.4rem);
    font-weight: 200;
    letter-spacing: 0.5em;
    color: rgba(255,255,255,0.85);
    line-height: 2;
  }

  .word-line2 {
    display: none;
    margin-top: 0.5rem;
  }

  .word-line2.visible-line { display: block; }

  @media (pointer: coarse) {
    #word.word-single-line .word-main {
      white-space: nowrap;
      letter-spacing: 0.28em;
      font-size: clamp(0.82rem, 3.2vw, 1.15rem);
    }
  }

  /* タップヒント */
  #hint {
    position: fixed;
    bottom: 5vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.2rem;
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.75);
    z-index: 30;
    animation: hintFade 4s ease-in-out infinite;
  }

  @keyframes hintFade {
    0%, 100% { opacity: 0.65; }
    50% { opacity: 1; }
  }

  /* 画面タップの波紋 */
  .ripple {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.3);
    transform: translate(-50%, -50%) scale(0);
    animation: rippleOut 13.5s ease-out forwards;
    pointer-events: none;
    z-index: 50;
  }

  @keyframes rippleOut {
    to {
      transform: translate(-50%, -50%) scale(8);
      opacity: 0;
    }
  }

  @media (pointer: coarse) {
    .ripple {
      animation-name: rippleOutMobile;
    }
  }

  @keyframes rippleOutMobile {
    to {
      transform: translate(-50%, -50%) scale(5.6);
      opacity: 0;
    }
  }

  /* フェードアウト遷移 */
  #fade {
    position: fixed;
    inset: 0;
    background: #0a0a0f;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease;
  }
  #fade.show { opacity: 1; pointer-events: all; }

  /* マウス位置マーク（PC・最終場面まで） */
  #cursor-mark {
    position: fixed;
    left: 0;
    top: 0;
    width: 8px;
    height: 8px;
    pointer-events: none;
    z-index: 60;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 1.5s ease;
  }

  @media (pointer: coarse) {
    #cursor-mark { display: none; }
  }

  #cursor-mark::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.5);
    filter: blur(1px);
  }

  #cursor-mark::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 3px rgba(255, 255, 255, 0.8);
  }

  #cursor-mark.visible { opacity: 1; }

  /* 最終場面（自然な青空） */
  body.finale .sky {
    filter: brightness(1) saturate(1.08);
    transition: opacity 6s ease;
    background-repeat: no-repeat;
  }

  .sky-finale-contrail {
    background-color: #5a9ec8;
    background-image:
      linear-gradient(180deg, #2d6a9e 0%, #4a8ec4 38%, #7eb5dc 62%, #b5d9ef 88%, #d8ecf8 100%),
      url('images/sky-contrail.png');
    background-size: 100% 100%, 185% auto;
    background-position: center, 50% 28%;
    -webkit-mask-image: radial-gradient(ellipse 78% 58% at 50% 40%, #000 25%, transparent 72%);
    mask-image: radial-gradient(ellipse 78% 58% at 50% 40%, #000 25%, transparent 72%);
  }

  .sky-finale-moon {
    background-color: #3d8fd4;
    background-image:
      linear-gradient(180deg, #1e6aab 0%, #3d94d4 30%, #5eb0e8 58%, #8ecae8 82%, #c5e4f8 100%),
      url('images/sky-moon.png');
    background-size: 100% 100%, 140% auto;
    background-position: center, 50% 62%;
    -webkit-mask-image: radial-gradient(ellipse 88% 72% at 50% 48%, #000 35%, transparent 78%);
    mask-image: radial-gradient(ellipse 88% 72% at 50% 48%, #000 35%, transparent 78%);
  }

  body.finale .overlay {
    background:
      linear-gradient(to bottom,
        rgba(30, 80, 130, 0.08) 0%,
        transparent 40%,
        transparent 80%,
        rgba(40, 90, 140, 0.1) 100%
      );
  }

  /* 一番星（最終画面・左側） */
  #first-star {
    position: fixed;
    left: 14%;
    top: 24%;
    width: 10px;
    height: 10px;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transform: translate(0, 0);
    transition: opacity 4s ease, transform 60s linear;
  }

  #first-star.visible { opacity: 1; }

  body.finale.celestial-approach #first-star,
  body.finale.celestial-met #first-star {
    transform: translate(22vw, -1.5vh);
  }

  #first-star::before {
    content: '';
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(
      circle,
      rgba(255, 255, 255, 0.55) 0%,
      rgba(255, 255, 255, 0.2) 35%,
      transparent 70%
    );
    filter: blur(3px);
    animation: firstStarGlow 5s ease-in-out infinite;
  }

  #first-star::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    width: 3px;
    height: 3px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    filter: blur(0.6px);
    box-shadow: 0 0 6px rgba(255, 255, 255, 0.85), 0 0 16px rgba(255, 255, 255, 0.4);
  }

  @keyframes firstStarGlow {
    0%, 100% { opacity: 0.65; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.08); }
  }

  #finale-moon {
    position: fixed;
    top: 14%;
    right: 18%;
    left: auto;
    width: min(32vw, 26vh);
    height: min(32vw, 26vh);
    z-index: 20;
    opacity: 0;
    transform: translate(0, 0);
    transition: opacity 5s ease, transform 60s linear;
    pointer-events: none;
  }

  #finale-moon.visible { opacity: 0.9; }

  body.finale.celestial-approach #finale-moon,
  body.finale.celestial-met #finale-moon {
    transform: translate(-22vw, 1vh);
  }

  body.finale.celestial-met #first-star,
  body.finale.celestial-met #finale-moon {
    transition: opacity 5s ease, transform 0s linear;
  }

  #finale-moon svg {
    width: 100%;
    height: 100%;
    overflow: visible;
    filter: blur(0.3px);
  }

  .moon-glow {
    fill: rgba(255, 255, 255, 0.35);
    filter: blur(8px);
  }

  .moon-body {
    fill: #f6fbff;
    filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.5))
            drop-shadow(0 0 28px rgba(220, 235, 255, 0.35));
  }

  body.finale .word-main {
    letter-spacing: 0.35em;
    max-width: 92vw;
    min-height: 2.5em;
  }

  body.finale #word.visible {
    transition: opacity 1.5s ease;
  }

  #back-btn {
    display: none;
    margin-top: 1.4rem;
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 200;
    letter-spacing: 0.4em;
    color: rgba(255, 255, 255, 0.45);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0.4rem 0.8rem;
    text-transform: lowercase;
  }

  #back-btn.visible { display: inline-block; }

  #back-btn:hover {
    color: rgba(255, 255, 255, 0.7);
  }

  /* 流れ星 */
  #shooting-stars {
    position: fixed;
    inset: 0;
    z-index: 18;
    pointer-events: none;
    opacity: 0;
    transition: opacity 3s ease;
    overflow: hidden;
  }

  #shooting-stars.visible { opacity: 1; }

  .shooting-head {
    position: absolute;
    left: 0;
    top: 0;
    width: 0;
    height: 0;
    will-change: transform;
    opacity: 0;
  }

  .shooting-head.run {
    animation: shootingHeadFlow 14s linear forwards;
  }

  .shooting-trail {
    position: absolute;
    top: 0;
    right: 0;
    width: 600px;
    height: 3px;
    transform-origin: 100% 50%;
    transform: rotate(var(--trail-angle)) translateY(-50%);
    filter: blur(2px);
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(255, 230, 160, 0.06) 18%,
      rgba(255, 220, 140, 0.28) 45%,
      rgba(255, 235, 180, 0.5) 72%,
      rgba(255, 245, 200, 0.75) 100%
    );
  }

  .shooting-head::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    width: 4px;
    height: 4px;
    background: rgba(255, 238, 170, 0.85);
    border-radius: 50%;
    transform: translate(50%, -50%);
    filter: blur(1px);
    box-shadow:
      0 0 8px rgba(255, 220, 120, 0.7),
      0 0 18px rgba(255, 200, 80, 0.45),
      0 0 32px rgba(255, 180, 60, 0.25);
  }

  @keyframes shootingHeadFlow {
    0% {
      transform: translate3d(var(--start-x), var(--start-y), 0);
      opacity: 0;
    }
    3% { opacity: 1; }
    90% { opacity: 0.85; }
    100% {
      transform: translate3d(var(--end-x), var(--end-y), 0);
      opacity: 0;
    }
  }
</style>
</head>
<body>

<div class="sky" id="sky1"></div>
<div class="sky" id="sky2"></div>
<div class="overlay"></div>

<div id="word">
  <div class="word-main" id="word-text">ただ、ここにいていい</div>
  <div class="word-main word-line2" id="word-text-2"></div>
  <button type="button" id="back-btn">back</button>
</div>

<div id="shooting-stars" aria-hidden="true"></div>

<div id="hint">tap softly</div>
<div id="first-star" aria-hidden="true"></div>

<div id="finale-moon" aria-hidden="true">
  <svg viewBox="0 0 100 100" aria-hidden="true">
    <circle class="moon-glow" cx="52" cy="50" r="42"/>
    <path class="moon-body" d="M 58 12
      A 38 38 0 1 1 58 88
      A 22 38 0 1 0 58 12 Z"/>
  </svg>
</div>
<div id="cursor-mark" aria-hidden="true"></div>
<div id="fade"></div>

<script>
// 空の写真 — GitHubにpushした後は実際のパスに変える
// 今は美しいグラデーションで代替
const skies = [
  { gradient: 'linear-gradient(to bottom, #2c3e50 0%, #4a6fa5 40%, #c9a96e 70%, #8b5e3c 100%)' },
  { gradient: 'linear-gradient(to bottom, #1a1a2e 0%, #4a5568 30%, #718096 60%, #a0aec0 85%, #e8d5b7 100%)' },
  { gradient: 'linear-gradient(to bottom, #0d1117 0%, #1e2d40 40%, #2d4a6e 70%, #4a7fa5 100%)' },
  { gradient: 'linear-gradient(to bottom, #2d1b33 0%, #4a3560 40%, #7a6090 70%, #b8a8c8 90%, #e8dff0 100%)' },
];

const FINALE_MOON_DELAY = 10000;
const SHOOTING_STAR_DURATION = 14000;
const SHOOTING_STAR_PAUSE = 5000;
const CELESTIAL_APPROACH_DURATION = 60000;
const FINALE_LINE1 = '全ては　大切な人に出会うために';
const FINALE_LINE2 = '起こったのかもしれない';
const TYPEWRITER_DELAY = 400;

const messages = [
  'ただ、ここにいていい',
  '苦手なことがあってもいい',
  '呼吸してみる',
  '生きていてくれてありがとう',
  '人は変わっていくね',
  '空は続く',
];

// 実際の写真ファイルがある場合は以下のように上書き
// skies[0].image = 'sky1.jpg';
// skies[1].image = 'sky2.jpg';

let messageIndex = 0;
let finaleActive = false;
let finaleMoonTimer = null;
let typewriterTimer = null;
let isTransitioning = false;
let cursorIdleTimer = null;
let shootingStarTimer = null;
let shootingStarLoopActive = false;
let celestialApproachTimer = null;

const finaleMoonEl = document.getElementById('finale-moon');
const firstStarEl = document.getElementById('first-star');
const shootingStarsEl = document.getElementById('shooting-stars');
const backBtn = document.getElementById('back-btn');

function isCoarsePointer() {
  return window.matchMedia('(pointer: coarse)').matches;
}

const sky1El = document.getElementById('sky1');
const sky2El = document.getElementById('sky2');
const wordEl = document.getElementById('word');
const wordText = document.getElementById('word-text');
const wordText2 = document.getElementById('word-text-2');
const hintEl = document.getElementById('hint');
const cursorMark = document.getElementById('cursor-mark');

function applySky(el, idx) {
  const s = skies[idx];
  if (s.image) {
    el.style.backgroundImage = `url(${s.image})`;
  } else {
    el.style.backgroundImage = s.gradient;
  }
}

function showScene(idx) {
  const skyIdx = idx % skies.length;
  const active = skyIdx % 2 === 0 ? sky1El : sky2El;
  const inactive = skyIdx % 2 === 0 ? sky2El : sky1El;

  applySky(active, skyIdx);
  const msg = messages[idx];
  wordText.textContent = msg;
  wordText2.textContent = '';
  wordText2.classList.remove('visible-line');
  wordEl.classList.toggle('word-single-line', msg === '人は変わっていくね' && isCoarsePointer());

  setTimeout(() => {
    inactive.classList.remove('visible');
    active.classList.add('visible');
    setTimeout(() => wordEl.classList.add('visible'), 1500);
  }, 100);
}

function applyFinaleContrail(el) {
  el.className = 'sky sky-finale-contrail';
}

function applyFinaleMoonSky(el) {
  el.className = 'sky sky-finale-moon';
}

function showFinaleTypewriter() {
  clearTimeout(typewriterTimer);
  const chars1 = [...FINALE_LINE1];
  const chars2 = [...FINALE_LINE2];
  let i = 0;
  wordText.textContent = '';
  wordText2.textContent = '';
  wordText2.classList.remove('visible-line');
  wordEl.classList.remove('word-single-line');

  function tick2() {
    if (i < chars2.length) {
      wordText2.textContent += chars2[i];
      i++;
      typewriterTimer = setTimeout(tick2, TYPEWRITER_DELAY);
    } else {
      backBtn.classList.add('visible');
      startCelestialApproach();
    }
  }

  function tick1() {
    if (i < chars1.length) {
      wordText.textContent += chars1[i];
      i++;
      typewriterTimer = setTimeout(tick1, TYPEWRITER_DELAY);
    } else {
      wordText2.classList.add('visible-line');
      i = 0;
      tick2();
    }
  }
  tick1();
}

function showFinaleMoon() {
  applyFinaleMoonSky(sky2El);
  sky1El.classList.remove('visible');
  sky2El.classList.add('visible');
  finaleMoonEl.classList.add('visible');
  finaleMoonEl.setAttribute('aria-hidden', 'false');
}

function randomShootingPath() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const dist = Math.max(w, h) * 0.85;
  const cx = w / 2;
  const cy = h / 2;
  const angleRad = Math.random() * Math.PI * 2;
  const dx = Math.cos(angleRad);
  const dy = Math.sin(angleRad);
  return {
    sx: cx - dx * dist,
    sy: cy - dy * dist,
    ex: cx + dx * dist,
    ey: cy + dy * dist,
    angle: (angleRad * 180) / Math.PI,
  };
}

function stopShootingStars() {
  shootingStarLoopActive = false;
  clearTimeout(shootingStarTimer);
  shootingStarsEl.replaceChildren();
}

function scheduleNextShootingStar() {
  if (!shootingStarLoopActive || !finaleActive) return;
  shootingStarTimer = setTimeout(spawnShootingStar, SHOOTING_STAR_PAUSE);
}

function spawnShootingStar() {
  if (!shootingStarLoopActive || !finaleActive) return;

  const path = randomShootingPath();
  const head = document.createElement('div');
  head.className = 'shooting-head run';
  head.style.setProperty('--start-x', `${path.sx}px`);
  head.style.setProperty('--start-y', `${path.sy}px`);
  head.style.setProperty('--end-x', `${path.ex}px`);
  head.style.setProperty('--end-y', `${path.ey}px`);
  head.style.setProperty('--trail-angle', `${path.angle + 180}deg`);

  const trail = document.createElement('div');
  trail.className = 'shooting-trail';
  head.appendChild(trail);
  shootingStarsEl.appendChild(head);

  shootingStarTimer = setTimeout(() => {
    head.remove();
    scheduleNextShootingStar();
  }, SHOOTING_STAR_DURATION);
}

function startShootingStars() {
  shootingStarLoopActive = true;
  shootingStarsEl.replaceChildren();
  spawnShootingStar();
}

function startCelestialApproach() {
  if (!finaleActive || document.body.classList.contains('celestial-approach')) return;

  if (!finaleMoonEl.classList.contains('visible')) {
    clearTimeout(finaleMoonTimer);
    showFinaleMoon();
  }

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.body.classList.add('celestial-approach');
    });
  });

  clearTimeout(celestialApproachTimer);
  celestialApproachTimer = setTimeout(() => {
    document.body.classList.add('celestial-met');
  }, CELESTIAL_APPROACH_DURATION);
}

function hideCursorMarkForFinale() {
  clearTimeout(cursorIdleTimer);
  cursorMark.classList.remove('visible');
  cursorMark.setAttribute('aria-hidden', 'true');
}

function resetToStart() {
  clearTimeout(finaleMoonTimer);
  clearTimeout(typewriterTimer);
  clearTimeout(celestialApproachTimer);
  finaleActive = false;
  messageIndex = 0;
  isTransitioning = false;

  document.body.classList.remove('finale', 'celestial-approach', 'celestial-met');
  stopShootingStars();
  shootingStarsEl.classList.remove('visible');
  shootingStarsEl.setAttribute('aria-hidden', 'true');
  finaleMoonEl.classList.remove('visible');
  finaleMoonEl.setAttribute('aria-hidden', 'true');
  firstStarEl.classList.remove('visible');
  firstStarEl.setAttribute('aria-hidden', 'true');
  backBtn.classList.remove('visible');

  sky1El.className = 'sky';
  sky2El.className = 'sky';
  sky1El.style.filter = '';
  sky2El.style.filter = '';
  sky1El.classList.remove('visible');
  sky2El.classList.remove('visible');

  hintEl.style.display = '';
  hintEl.style.opacity = '';
  wordEl.classList.remove('visible');

  showScene(0);
}

function showFinale() {
  finaleActive = true;
  document.body.classList.add('finale');
  hideCursorMarkForFinale();
  hintEl.style.opacity = '0';
  wordEl.classList.remove('visible');
  wordText.textContent = '';
  wordText2.textContent = '';
  wordText2.classList.remove('visible-line');
  wordEl.classList.remove('word-single-line');
  finaleMoonEl.classList.remove('visible');
  backBtn.classList.remove('visible');
  document.body.classList.remove('celestial-approach', 'celestial-met');

  firstStarEl.classList.add('visible');
  firstStarEl.setAttribute('aria-hidden', 'false');

  applyFinaleContrail(sky1El);
  sky2El.className = 'sky';
  sky2El.classList.remove('visible');
  sky1El.classList.add('visible');

  shootingStarsEl.classList.add('visible');
  shootingStarsEl.setAttribute('aria-hidden', 'false');
  startShootingStars();

  setTimeout(() => {
    hintEl.style.display = 'none';
    wordEl.classList.add('visible');
    showFinaleTypewriter();
  }, 1200);

  finaleMoonTimer = setTimeout(showFinaleMoon, FINALE_MOON_DELAY);
}

function createRipple(x, y) {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = x + 'px';
  r.style.top = y + 'px';
  r.style.width = '60px';
  r.style.height = '60px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 13500);
}

function nextScene() {
  if (isTransitioning || finaleActive) return;
  isTransitioning = true;

  wordEl.classList.remove('visible');

  setTimeout(() => {
    if (messageIndex < messages.length - 1) {
      messageIndex++;
      showScene(messageIndex);
    } else {
      showFinale();
    }
    isTransitioning = false;
  }, 1200);
}

function showCursorMark(x, y) {
  if (finaleActive || isCoarsePointer()) return;
  cursorMark.style.left = x + 'px';
  cursorMark.style.top = y + 'px';
  cursorMark.classList.add('visible');
  cursorMark.setAttribute('aria-hidden', 'false');
  clearTimeout(cursorIdleTimer);
  cursorIdleTimer = setTimeout(() => {
    if (finaleActive) return;
    cursorMark.classList.remove('visible');
    cursorMark.setAttribute('aria-hidden', 'true');
  }, 2000);
}

backBtn.addEventListener('click', e => {
  e.stopPropagation();
  resetToStart();
});

// タップ・クリック — どこを触れても波紋
document.addEventListener('click', e => {
  if (e.target === backBtn) return;
  createRipple(e.clientX, e.clientY);
  nextScene();
});
document.addEventListener('touchend', e => {
  const t = e.changedTouches[0];
  createRipple(t.clientX, t.clientY);
  nextScene();
});

showScene(0);

document.addEventListener('mousemove', e => {
  showCursorMark(e.clientX, e.clientY);
});

document.addEventListener('mouseleave', () => {
  if (finaleActive || isCoarsePointer()) return;
  clearTimeout(cursorIdleTimer);
  cursorMark.classList.remove('visible');
  cursorMark.setAttribute('aria-hidden', 'true');
});

// 60秒で自動的に次へ
setInterval(() => {
  if (!isTransitioning && !finaleActive) {
    createRipple(window.innerWidth / 2, window.innerHeight / 2);
    nextScene();
  }
}, 60000);
</script>
